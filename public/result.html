<!DOCTYPE html>
<html>
<head>
<title>BMI Result</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card">

<h2>BMI Result</h2>

<p>Hello <b id="name"></b></p>

<p>Your BMI is <b id="bmi"></b></p>

<p>Category: <b id="category"></b></p>

<br>

<a href="/">Calculate Again</a>

</div>

<script>

const params = new URLSearchParams(window.location.search);

document.getElementById("name").textContent = params.get("name");
document.getElementById("bmi").textContent = params.get("bmi");
document.getElementById("category").textContent = params.get("category");

</script>

</body>
</html>
